    <script>
        // About dropdown toggle functionality
        document.addEventListener('DOMContentLoaded', function () {
                        // Dropdowns in Projects section
                        const projectDropdownBtns = document.querySelectorAll('.projects-section .dropdown-btn');
                        projectDropdownBtns.forEach(function (btn) {
                            const content = btn.parentElement.nextElementSibling;
                            const arrow = btn.querySelector('.arrow');
                            btn.addEventListener('click', function () {
                                const isOpen = content.style.display === 'block';
                                if (!isOpen) {
                                    content.style.display = 'block';
                                    arrow.style.transform = 'rotate(90deg)';
                                    btn.setAttribute('aria-expanded', 'true');
                                } else {
                                    content.style.display = 'none';
                                    arrow.style.transform = 'rotate(0deg)';
                                    btn.setAttribute('aria-expanded', 'false');
                                }
                            });
                        });
            // Dropdowns in About section
            const aboutDropdownBtns = document.querySelectorAll('.about-section .dropdown-btn');
            aboutDropdownBtns.forEach(function (btn) {
                const content = btn.nextElementSibling;
                const arrow = btn.querySelector('.arrow');
                btn.addEventListener('click', function () {
                    const isOpen = content.style.display === 'block';
                    if (!isOpen) {
                        content.style.display = 'block';
                        arrow.style.transform = 'rotate(90deg)';
                        btn.setAttribute('aria-expanded', 'true');
                    } else {
                        content.style.display = 'none';
                        arrow.style.transform = 'rotate(0deg)';
                        btn.setAttribute('aria-expanded', 'false');
                    }
                });
            });

            // Tab switching logic
            const aboutSection = document.getElementById('about');
            const projectsSection = document.getElementById('projects');
            const linksSection = document.getElementById('links');
            const aboutTab = document.getElementById('about-tab');
            const projectsTab = document.getElementById('projects-tab');
            const linksTab = document.getElementById('links-tab');

            function setActiveTab(tab) {
                [aboutTab, projectsTab, linksTab].forEach(btn => btn.classList.remove('active'));
                tab.classList.add('active');
            }
            aboutTab.addEventListener('click', function () {
                aboutSection.style.display = 'block';
                projectsSection.style.display = 'none';
                linksSection.style.display = 'none';
                setActiveTab(aboutTab);
            });
            projectsTab.addEventListener('click', function () {
                aboutSection.style.display = 'none';
                projectsSection.style.display = 'flex';
                linksSection.style.display = 'none';
                setActiveTab(projectsTab);
            });
            linksTab.addEventListener('click', function () {
                aboutSection.style.display = 'none';
                projectsSection.style.display = 'none';
                linksSection.style.display = 'block';
                setActiveTab(linksTab);
            });
            // Set About as active on load
            setActiveTab(aboutTab);
        });
    </script>

    <script>

            const arrow = document.querySelector('.dropdown-btn .arrow');
            if (dropdownBtn && dropdownContent && arrow) {
                dropdownBtn.addEventListener('click', function () {
                    const isOpen = dropdownContent.style.display === 'block';
                    if (!isOpen) {
                        dropdownContent.style.display = 'block';
                        arrow.style.transform = 'rotate(90deg)';
                        dropdownBtn.setAttribute('aria-expanded', 'true');
                    } else {
                        dropdownContent.style.display = 'none';
                        arrow.style.transform = 'rotate(0deg)';
                        dropdownBtn.setAttribute('aria-expanded', 'false');
