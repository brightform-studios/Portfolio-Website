<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brightform Studios</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="icon.png">
</head>

<body>
    <header class="header-bar">
        <h1 class="site-title">BRIGHTFORM STUDIOS</h1>
        <!-- GitHub link removed from header -->
        <nav>
            <button class="nav-btn" id="about-tab">About</button>
            <button class="nav-btn" id="projects-tab">Projects</button>
            <button class="nav-btn" id="services-tab">Services</button>
        </nav>
    </header>

    <main>
        <section id="about" class="about-section" style="display: flex;"></section>

        <section id="projects" class="projects-section" style="display: none;"></section>

        <section id="services" class="services-section" style="display: none;"></section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const dropdownBtns = document.querySelectorAll('.dropdown-group .dropdown-btn');
            dropdownBtns.forEach(function (btn) {
                const group = btn.closest('.dropdown-group');
                const content = group ? group.querySelector('.dropdown-content') : null;
                const arrow = btn.querySelector('.arrow');
                if (!content || !arrow) return;

                btn.addEventListener('click', function () {
                    const isOpen = content.style.display === 'block';
                    content.style.display = isOpen ? 'none' : 'block';
                    arrow.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(90deg)';
                    btn.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
                });
            });

            const aboutSection = document.getElementById('about');
            const projectsSection = document.getElementById('projects');
            const servicesSection = document.getElementById('services');
            const aboutTab = document.getElementById('about-tab');
            const projectsTab = document.getElementById('projects-tab');
            const servicesTab = document.getElementById('services-tab');

            function setActiveTab(tab) {
                [aboutTab, projectsTab, servicesTab].forEach(function (button) {
                    button.classList.remove('active');
                });
                tab.classList.add('active');
            }

            aboutTab.addEventListener('click', function () {
                aboutSection.style.display = 'flex';
                projectsSection.style.display = 'none';
                servicesSection.style.display = 'none';
                setActiveTab(aboutTab);
            });

            projectsTab.addEventListener('click', function () {
                aboutSection.style.display = 'none';
                projectsSection.style.display = 'flex';
                servicesSection.style.display = 'none';
                setActiveTab(projectsTab);
            });

            servicesTab.addEventListener('click', function () {
                aboutSection.style.display = 'none';
                projectsSection.style.display = 'none';
                servicesSection.style.display = 'flex';
                setActiveTab(servicesTab);
            });

            setActiveTab(aboutTab);
        });
    </script>

    <footer class="site-footer">
        <span class="footer-left"><b>&copy;</b> 2026 Brightform Studios</span>
        <nav class="footer-nav">
            <a href="#about">About</a>
            <span class="footer-sep">|</span>
            <a href="#projects">Projects</a>
            <span class="footer-sep">|</span>
            <a href="#services">Services</a>
        </nav>

            aria-label="GitHub profile" style="margin-right: 12px;">
